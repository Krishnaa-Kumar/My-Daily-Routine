<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Daily Routine</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1 class="title">✨ My Daily Routine ✨</h1>

    <div class="timeline">

        <div class="card morning">
            <span class="icon">🌅</span>
            <div class="info">
                <h2>7:00 AM</h2>
                <h3>☀️ Wake Up</h3>
                <p>Start the day with fresh energy</p>
            </div>
        </div>

        <div class="card morning">
            <span class="icon">🏃</span>
            <div class="info">
                <h2>8:00 AM</h2>
                <h3>💪 Exercise</h3>
                <p>Stay fit and active</p>
            </div>
        </div>

        <div class="card afternoon">
            <span class="icon">📚</span>
            <div class="info">
                <h2>10:00 AM</h2>
                <h3>🧠 Study</h3>
                <p>Focus on learning and assignments</p>
            </div>
        </div>

        <div class="card evening">
            <span class="icon">🎮</span>
            <div class="info">
                <h2>5:00 PM</h2>
                <h3>😌 Relax / Play</h3>
                <p>Refresh your mind</p>
            </div>
        </div>

        <div class="card night">
            <span class="icon">🌙</span>
            <div class="info">
                <h2>10:00 PM</h2>
                <h3>😴 Sleep</h3>
                <p>Rest well for the next day</p>
            </div>
        </div>

    </div>

</body>
</html>
